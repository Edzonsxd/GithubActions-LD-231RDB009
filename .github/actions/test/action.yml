name: 'Test Microservice'
description: 'Clones the test repo and runs API tests via Bash'
inputs:
  env_name:
    description: 'Environment name'
    required: true
runs:
  using: "composite"
  steps:
    - name: Info output
      run: echo "Running tests on ${{ inputs.env_name }} environment..."
      shell: bash

    - name: Checkout pipeline repo
      uses: actions/checkout@v6

    - name: Clone Test repo
      uses: actions/checkout@v6
      with:
        repository: mtararujs/course-js-api-framework
        path: course-js-api-framework

    - name: Install NPM dependencies
      working-directory: ./course-js-api-framework
      run: npm install
      shell: bash

    - name: Run tests
      working-directory: ./course-js-api-framework
      run: npm run greetings greetings_${{ inputs.env_name }}
      shell: bash