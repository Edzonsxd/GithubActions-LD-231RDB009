name: 'Deploy Microservice'
description: 'Clones the repo and deploys using pm2 on Windows via CMD'
inputs:
  env_name:
    description: 'Environment name (dev, stg, preprod, prod)'
    required: true
  port:
    description: 'Application port'
    required: true
runs:
  using: "composite"
  steps:
    - name: Info output
      shell: cmd
      run: echo Deploying to ${{ inputs.env_name }} environment on port ${{ inputs.port }}...

    - name: Checkout pipeline repo
      uses: actions/checkout@v6
      with:
        clean: false

    - name: Clone Python app repo
      uses: actions/checkout@v6
      with:
        repository: mtararujs/python-greetings
        path: python-greetings
        clean: false

    - name: Stop existing pm2 service
      shell: cmd
      run: pm2 delete greetings-app-${{ inputs.env_name }} || echo PM2 process greetings-app-${{ inputs.env_name }} was not running

    - name: Start service with pm2
      working-directory: ./python-greetings
      shell: cmd
      run: pm2 start app.py --name greetings-app-${{ inputs.env_name }} --interpreter "%GITHUB_WORKSPACE%\python-greetings\venv\Scripts\python.exe" -- --port ${{ inputs.port }}

    - name: Wait for service readiness
      shell: powershell
      run: |
        $url = "http://127.0.0.1:${{ inputs.port }}/greetings"
        1..30 | ForEach-Object {
          try {
            Invoke-RestMethod -Uri $url -Method Get -TimeoutSec 2 | Out-Null
            Write-Host "Service is ready at $url"
            exit 0
          } catch {
            Start-Sleep -Milliseconds 500
          }
        }
        pm2 logs greetings-app-${{ inputs.env_name }} --lines 50 --nostream
        throw "Service did not become ready at $url in time."