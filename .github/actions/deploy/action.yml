name: 'Deploy Microservice'
description: 'Clones the repo and deploys using pm2 on Windows via CMD'
inputs:
  env_name:
    description: 'Environment name (dev, stg, preprod, prod)'
    required: true
  port:
    description: 'Application port'
    required: true
runs:
  using: "composite"
  steps:
    - name: Info output
      shell: cmd
      run: echo Deploying to ${{ inputs.env_name }} environment on port ${{ inputs.port }}...

    - name: Stop existing pm2 service
      shell: cmd
      run: call "%GITHUB_WORKSPACE%\.github\scripts\pm2-stop.cmd" "${{ inputs.env_name }}"

    - name: Checkout pipeline repo
      uses: actions/checkout@v6
      with:
        clean: false

    - name: Clone Python app repo
      uses: actions/checkout@v6
      with:
        repository: mtararujs/python-greetings
        path: python-greetings
        clean: false

    - name: Start service with pm2
      working-directory: ./python-greetings
      shell: cmd
      run: call "%GITHUB_WORKSPACE%\.github\scripts\pm2-start.cmd" "${{ inputs.env_name }}" "${{ inputs.port }}" "%GITHUB_WORKSPACE%\python-greetings\venv\Scripts\python.exe"

    - name: Wait for service readiness
      shell: cmd
      run: call "%GITHUB_WORKSPACE%\.github\scripts\check-greetings-ready.cmd" "${{ inputs.port }}" "${{ inputs.env_name }}"